spring.application.name=backendAi
server.port=${BACKEND_PORT:8080}

# ===== MULTIPART FILE UPLOAD =====
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${FILE_UPLOAD_MAX_SIZE:10MB}
spring.servlet.multipart.max-request-size=${FILE_UPLOAD_MAX_SIZE:10MB}

# ===== CORS Configuration =====
spring.web.cors.allowed-origin-patterns=${CORS_ORIGINS:http://localhost:4200,http://localhost:3000}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# MySQL Configuration (DÉPRÉCIÉ - Utiliser PostgreSQL)
#spring.datasource.url=jdbc:mysql://localhost:3306/fridaaidb?createDatabaseIfNotExist=true&useSSL=true&verifyServerCertificate=false
#spring.datasource.username=root
#spring.datasource.password=Mmk!030809?
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:${DB_PORT:-5432}/${DB_NAME:fridaocrdb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:Mmk!030809?}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# OpenAPI documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# =====================================================
# Services Configuration
# =====================================================

services.ocr.url=${SERVICES_OCR_URL:http://localhost:8082}
services.ocr.mode=${SERVICES_OCR_MODE:rapide}

# =====================================================
# Sauvegarde & Archivage
# =====================================================
# Sauvegarde automatique activée ?
app.backup.auto-enabled=${BACKUP_AUTO_ENABLED:false}
# Rétention des sauvegardes (jours)
app.backup.retention-days=${BACKUP_RETENTION_DAYS:7}
# Cron sauvegarde quotidienne (par défaut 2h du matin)
app.backup.cron=${BACKUP_CRON:0 0 2 * * *}
# Seuil d'archivage en mois (dossiers plus vieux que X mois)
app.archive.threshold-months=${ARCHIVE_THRESHOLD_MONTHS:6}
# Chemin des archives (optionnel, défaut = ROOT_PATH/archives)
app.archive.path=${ARCHIVE_PATH:}
# Cron archivage mensuel (par défaut 1er du mois à 3h)
app.archive.cron=${ARCHIVE_CRON:0 0 3 1 * *}

# =====================================================
# Sécurité
# =====================================================
# Mode démo activé par défaut pour éviter les frictions
app.demo-mode=${APP_DEMO_MODE:true}
