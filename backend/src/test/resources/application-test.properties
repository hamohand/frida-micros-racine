# ===== Profil TEST =====
# H2 in-memory database (remplace PostgreSQL)
spring.datasource.url=jdbc:h2:mem:fridatestdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Port aléatoire pour éviter les conflits
server.port=0

# OCR Python : pointe vers le vrai service local
services.ocr.url=http://localhost:8082
services.ocr.mode=rapide

# Stockage temporaire (sera surchargé par le test)
ROOT_PATH=${java.io.tmpdir}/frida-test-storage

# Parallélisme
MAX_PARALLEL_FOLDERS=1

# Sécurité - mode démo pour les tests
app.demo-mode=true

# Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS
spring.web.cors.allowed-origin-patterns=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
