
services:
  # Base de données Licences (Isolée)
  license-db:
    image: postgres:15-alpine
    container_name: frida-license-db
    environment:
      POSTGRES_DB: frida_licenses_db
      POSTGRES_USER: ${DB_USER:-muhend}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-motdepassetresfortVPS2026}
    volumes:
      - license_db_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  # Serveur de licences (VPS)
  license-api:
    build:
      context: ./license-api
      dockerfile: Dockerfile
    container_name: frida-license-api
    environment:
      - DB_HOST=license-db
      - DB_PORT=5432
      - DB_NAME=frida_licenses_db
      - DB_USER=${DB_USER:-muhend}
      - DB_PASSWORD=${DB_PASSWORD:-motdepassetresfortVPS2026}
      - KEYCLOAK_URL=https://auth.hscode.enclume-numerique.com
      - KEYCLOAK_REALM=frida-realm
    depends_on:
      - license-db
    networks:
      - internal
      - webproxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=webproxy"
      - "traefik.http.routers.license-api.rule=Host(`licences.frida.enclume-numerique.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.license-api.entrypoints=websecure"
      - "traefik.http.routers.license-api.tls=true"
      - "traefik.http.routers.license-api.tls.certresolver=myresolver"
      - "traefik.http.services.license-api.loadbalancer.server.port=8083"
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  # Dashboard Administrateur des licences (VPS)
  license-dashboard:
    build:
      context: ./license-dashboard
      dockerfile: Dockerfile
      args:
        - API_URL=https://licences.frida.enclume-numerique.com/api
    container_name: frida-license-dashboard
    networks:
      - webproxy
    labels:
      - "traefik.enable=true"
      # Configuration HTTPS uniquement
      - "traefik.http.routers.license-dashboard.rule=Host(`licences.frida.enclume-numerique.com`)"
      - "traefik.http.routers.license-dashboard.entrypoints=websecure"
      - "traefik.http.routers.license-dashboard.tls=true"
      - "traefik.http.routers.license-dashboard.tls.certresolver=myresolver"
      - "traefik.http.services.license-dashboard.loadbalancer.server.port=80"
    restart: always
    deploy:
      resources:
        limits:
          memory: 100M
  # Base de données PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: frida-db
    environment:
      POSTGRES_DB: ${DB_NAME:-frida_db}
      POSTGRES_USER: ${DB_USER:-muhend}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-motdepassetresfortVPS2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  # OCR Léger (QR code uniquement)
  ocr-api:
    build:
      context: ./ocr-api
      dockerfile: Dockerfile
    container_name: frida-ocr-api
    environment:
      - PORT=8082
      - OCR_MODE=qrcode_only
    volumes:
      - ./ocr-api/entities:/app/app_ocr/entities
    networks:
      - internal
    restart: always
    deploy:
      resources:
        limits:
          memory: 300M

  # Backend Frida (incluant désormais le service Calculs)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: frida-backend
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-frida_db}
      - DB_USER=${DB_USER:-muhend}
      - DB_PASSWORD=${DB_PASSWORD:-motdepassetresfortVPS2026}
      - SERVICES_OCR_URL=http://ocr-api:8082
      - CORS_ORIGINS=https://frida.enclume-numerique.com,https://www.frida.enclume-numerique.com,https://simul-frida.enclume-numerique.com
      - APP_DEMO_MODE=true
    volumes:
      - frida_uploads:/app/uploads
    depends_on:
      - db
      - ocr-api
    networks:
      - internal
      - webproxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=webproxy"
      - "traefik.http.routers.frida-backend.rule=(Host(`frida.enclume-numerique.com`) || Host(`www.frida.enclume-numerique.com`) || Host(`simul-frida.enclume-numerique.com`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.frida-backend.entrypoints=websecure"
      - "traefik.http.routers.frida-backend.tls=true"
      - "traefik.http.routers.frida-backend.tls.certresolver=myresolver"
      - "traefik.http.services.frida-backend.loadbalancer.server.port=8080"
    restart: always
    deploy:
      resources:
        limits:
          memory: 800M

  # Frontend Angular
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - API_URL=https://frida.enclume-numerique.com/api
    container_name: frida-frontend
    networks:
      - webproxy
    labels:
      - "traefik.enable=true"
      # Configuration HTTP vers HTTPS
      - "traefik.http.routers.frida-frontend-http.rule=Host(`frida.enclume-numerique.com`) || Host(`www.frida.enclume-numerique.com`) || Host(`simul-frida.enclume-numerique.com`)"
      - "traefik.http.routers.frida-frontend-http.entrypoints=web"
      - "traefik.http.routers.frida-frontend-http.middlewares=frida-redirect"
      - "traefik.http.middlewares.frida-redirect.redirectscheme.scheme=https"
      # Configuration HTTPS
      - "traefik.http.routers.frida-frontend.rule=Host(`frida.enclume-numerique.com`) || Host(`www.frida.enclume-numerique.com`) || Host(`simul-frida.enclume-numerique.com`)"
      - "traefik.http.routers.frida-frontend.entrypoints=websecure"
      - "traefik.http.routers.frida-frontend.tls=true"
      - "traefik.http.routers.frida-frontend.tls.certresolver=myresolver"
      - "traefik.http.services.frida-frontend.loadbalancer.server.port=80"
    restart: always
    deploy:
      resources:
        limits:
          memory: 100M

volumes:
  postgres_data:
  frida_uploads:
  license_db_data:

networks:
  internal:
    internal: true
  webproxy:
    # Réseau externe créé manuellement (ou géré par Traefik)
    name: webproxy
    external: true
