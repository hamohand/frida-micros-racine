server {
  listen 80;
  server_name localhost;
  client_max_body_size 10M;

  root /usr/share/nginx/html;
  index index.html index.htm;

  # Gestion du cache des assets (CSS, JS, images)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # Route Angular - SPA routing
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Proxy API vers le backend
  location /api/ {
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $upstream_api "http://backend:8080";
    proxy_pass $upstream_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
  }

  # Proxy Swagger UI
  location /swagger-ui/ {
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $upstream_swagger "http://backend:8080/swagger-ui/";
    proxy_pass $upstream_swagger;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Proxy OpenAPI specs
  location /v3/api-docs/ {
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $upstream_docs "http://backend:8080/v3/api-docs/";
    proxy_pass $upstream_docs;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /swagger-ui.html {
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $upstream_swagger_html "http://backend:8080/swagger-ui.html";
    proxy_pass $upstream_swagger_html;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Health check endpoint
  location /health {
    access_log off;
    return 200 "OK";
    add_header Content-Type text/plain;
  }

  # Sécurité - bloquer l'accès aux fichiers sensibles
  location ~ /\. {
    deny all;
  }

  location ~ ~$ {
    deny all;
  }

  # Gestion des erreurs
  error_page 404 /index.html;
}
